<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClockFlow PRO</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="eyebrow">CLOCKFLOW</div>
      <h1>Clock In / Out</h1>

      <label for="employeeSelect">Employee</label>
      <select id="employeeSelect"></select>

      <label for="pinInput">PIN</label>
      <input id="pinInput" type="password" inputmode="numeric" placeholder="Enter PIN" />

      <div class="site-note" id="siteNote"></div>

      <button class="btn btn-in" id="clockInBtn">Clock In</button>
      <button class="btn btn-out" id="clockOutBtn">Clock Out</button>

      <div id="message" class="message"></div>

      <a class="link" href="/admin.html">Open Admin Panel</a>
    </div>
  </div>

  <script src="/mobile.js"></script>
</body>
</html>
