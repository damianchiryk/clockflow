
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClockFlow</title>
</head>
<body>
<h2>ClockFlow</h2>

<select id="emp">
<option value="damian">Damian</option>
</select>

<input id="pin" placeholder="PIN"/>

<button onclick="clock('in')">IN</button>
<button onclick="clock('out')">OUT</button>

<p id="msg"></p>

<a href="/admin.html">Admin</a>

<script>
function clock(action){
  fetch('/api/clock',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      employeeId:document.getElementById('emp').value,
      pin:document.getElementById('pin').value,
      action
    })
  })
  .then(r=>r.json())
  .then(d=>{
    document.getElementById('msg').innerText = JSON.stringify(d)
  })
}
</script>

</body>
</html>
