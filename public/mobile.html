<!doctype html><html><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>ClockFlow Mobile</title><style>
body{font-family:Arial,sans-serif;margin:0;background:#0b0f14;color:#fff}.wrap{max-width:480px;margin:0 auto;padding:18px}.card{background:#141a22;border:1px solid #273040;border-radius:14px;padding:18px;margin-bottom:14px}input,button{padding:14px;border-radius:10px;border:1px solid #334155;background:#0f172a;color:#fff;width:100%;box-sizing:border-box}button{background:#d4af37;color:#111;font-weight:700;cursor:pointer}.red{background:#ef4444;color:#fff}.hidden{display:none}.error{color:#ff8a8a;margin-top:10px}.muted{color:#9aa4b2}
</style></head><body><div class="wrap">
<div id="loginCard" class="card"><h1>ClockFlow Worker</h1><p class="muted">Test account: test.anywhere / Test123!</p><input id="login" value="test.anywhere"/><div style="height:8px"></div><input id="password" value="Test123!" type="password"/><div style="height:12px"></div><button onclick="login()">Sign in</button><div id="loginError" class="error"></div></div>
<div id="app" class="hidden"><div class="card"><div class="muted">Hello</div><h2 id="name">—</h2><div class="muted">Assigned site: <span id="siteName">—</span></div><div class="muted">Live status: <span id="gpsStatus">Waiting for GPS…</span></div><div class="muted" id="coords">—</div></div>
<div id="changePw" class="card hidden"><h3>Change temporary password</h3><input id="currentPassword" type="password" placeholder="Current password"/><div style="height:8px"></div><input id="newPassword" type="password" placeholder="New password"/><div style="height:12px"></div><button onclick="changePassword()">Update password</button><div id="pwError" class="error"></div></div>
<div class="card"><button id="inBtn" onclick="punch('CLOCK_IN')">Clock in</button><div style="height:8px"></div><button id="outBtn" class="red" onclick="punch('CLOCK_OUT')">Clock out</button><div id="punchError" class="error"></div></div>
<div class="card"><h3>Recent activity</h3><div id="events"></div></div></div></div>
<script>
let token = localStorage.getItem('clockflow_worker_token') || ''; let position=null;
async function api(path, options={}){ const res=await fetch('/api'+path,{...options,headers:{'Content-Type':'application/json',...(token?{Authorization:'Bearer '+token}:{})}}); const data=await res.json().catch(()=>({})); if(!res.ok) throw new Error(data.error||'Request failed'); return data; }
function watchGps(){ if(!navigator.geolocation){document.getElementById('gpsStatus').textContent='No geolocation'; return;} navigator.geolocation.watchPosition((pos)=>{ position={latitude:pos.coords.latitude,longitude:pos.coords.longitude,accuracy:pos.coords.accuracy||0}; document.getElementById('gpsStatus').textContent='GPS ready'; document.getElementById('coords').textContent=`${position.latitude.toFixed(5)}, ${position.longitude.toFixed(5)}`; },(err)=>{ document.getElementById('gpsStatus').textContent='Location error: '+err.message; },{enableHighAccuracy:true,maximumAge:10000,timeout:10000}); }
async function login(){ document.getElementById('loginError').textContent=''; try{ const data=await api('/auth/login',{method:'POST',body:JSON.stringify({login:document.getElementById('login').value,password:document.getElementById('password').value})}); token=data.token; localStorage.setItem('clockflow_worker_token',token); await loadApp(); }catch(e){ document.getElementById('loginError').textContent=e.message; } }
async function loadApp(){ const me=await api('/me'); document.getElementById('name').textContent=me.user.fullName; document.getElementById('siteName').textContent=me.site?me.site.name:'—'; document.getElementById('loginCard').classList.add('hidden'); document.getElementById('app').classList.remove('hidden'); document.getElementById('changePw').classList.toggle('hidden', !me.user.mustChangePassword); await loadEvents(); }
async function loadEvents(){ const events=await api('/attendance/me'); document.getElementById('events').innerHTML=events.map(e=>`<div style="padding:8px 0;border-bottom:1px solid #273040"><strong>${e.type==='CLOCK_IN'?'Clock in':'Clock out'}</strong><br/><span class="muted">${new Date(e.createdAt).toLocaleString()}</span><br/><span class="muted">Distance: ${e.distanceMeters}m</span></div>`).join('') || '<div class="muted">No events yet</div>'; const last=events[0]; const isIn=last && last.type==='CLOCK_IN'; document.getElementById('inBtn').disabled=!!isIn; document.getElementById('outBtn').disabled=!isIn; }
async function changePassword(){ document.getElementById('pwError').textContent=''; try{ await api('/auth/change-password',{method:'POST',body:JSON.stringify({currentPassword:document.getElementById('currentPassword').value,newPassword:document.getElementById('newPassword').value})}); await loadApp(); }catch(e){ document.getElementById('pwError').textContent=e.message; } }
async function punch(type){ document.getElementById('punchError').textContent=''; try{ if(!position) throw new Error('GPS not ready'); await api('/attendance/punch',{method:'POST',body:JSON.stringify({...position,type})}); await loadEvents(); }catch(e){ document.getElementById('punchError').textContent=e.message; } }
watchGps(); (async function init(){ if(!token) return; try{ await loadApp(); }catch{ localStorage.removeItem('clockflow_worker_token'); token=''; } })();
</script></body></html>
