<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClockFlow Admin</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="page admin-page">
    <div class="card admin-card">
      <div class="eyebrow">CLOCKFLOW</div>
      <h1>Admin Panel</h1>

      <div class="admin-grid">
        <div class="panel">
          <h2>Add Employee</h2>
          <label>Name</label>
          <input id="empName" type="text" placeholder="Full name" />

          <label>PIN</label>
          <input id="empPin" type="text" placeholder="PIN" />

          <label>Site</label>
          <select id="empSite"></select>

          <label>Hourly rate (£)</label>
          <input id="empRate" type="number" step="0.01" placeholder="0.00" />

          <label>Lunch minutes</label>
          <input id="empLunch" type="number" step="1" placeholder="0" />

          <div class="checks">
            <label class="check"><input id="empGeoRequired" type="checkbox" checked /> Geolocation required</label>
            <label class="check"><input id="empIsAdmin" type="checkbox" /> Admin profile</label>
          </div>

          <button class="btn btn-refresh" id="addEmployeeBtn">Create employee</button>
          <div class="message" id="adminMessage"></div>
        </div>

        <div class="panel">
          <h2>Employees</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Site</th>
                  <th>Rate</th>
                  <th>Lunch</th>
                  <th>Geo</th>
                </tr>
              </thead>
              <tbody id="employeesBody">
                <tr><td colspan="5">No employees</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="panel" style="margin-top:24px;">
        <div class="admin-header">
          <h2 style="margin:0;">Logs</h2>
          <button class="btn btn-refresh" id="refreshLogsBtn">Refresh</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Site</th>
                <th>Action</th>
                <th>Time</th>
                <th>GPS</th>
              </tr>
            </thead>
            <tbody id="logsBody">
              <tr><td colspan="5">No logs yet</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="panel" style="margin-top:24px;">
        <div class="admin-header">
          <h2 style="margin:0;">Weekly Payroll (Mon-Sun)</h2>
          <button class="btn btn-refresh" id="refreshReportBtn">Refresh</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Site</th>
                <th>Rate</th>
                <th>Lunch</th>
                <th>Hours</th>
                <th>Paid</th>
                <th>Gross</th>
              </tr>
            </thead>
            <tbody id="reportBody">
              <tr><td colspan="7">No report yet</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <a class="link" href="/mobile.html">Back to Mobile</a>
    </div>
  </div>

  <script src="/admin.js"></script>
</body>
</html>
