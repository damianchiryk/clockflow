<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClockFlow Admin</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="page">
    <div class="card admin-card">
      <div class="admin-header">
        <div>
          <div class="eyebrow">CLOCKFLOW</div>
          <h1>Admin Panel</h1>
        </div>
        <button class="btn btn-refresh" id="refreshBtn">Refresh</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Action</th>
              <th>Time</th>
            </tr>
          </thead>
          <tbody id="logsBody">
            <tr>
              <td colspan="3">No logs yet</td>
            </tr>
          </tbody>
        </table>
      </div>

      <a class="link" href="/mobile.html">Back to Mobile</a>
    </div>
  </div>

  <script src="/admin.js"></script>
</body>
</html>
