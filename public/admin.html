<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="box">
<h2>Admin Panel</h2>
<pre id="logs"></pre>
</div>

<script>
fetch('/logs')
.then(r => r.json())
.then(data => {
  document.getElementById('logs').innerText = JSON.stringify(data, null, 2);
});
</script>
</body>
</html>
