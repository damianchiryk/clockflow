
<!DOCTYPE html>
<html>
<head><title>Admin</title></head>
<body>

<h2>Admin Login</h2>
<input id="pass" placeholder="Password"/>
<button onclick="load()">Login</button>

<pre id="logs"></pre>

<script>
function load(){
  fetch('/api/logs',{
    headers:{
      'x-admin-password': document.getElementById('pass').value
    }
  })
  .then(r=>r.json())
  .then(d=>{
    document.getElementById('logs').innerText = JSON.stringify(d,null,2)
  })
}
</script>

</body>
</html>
